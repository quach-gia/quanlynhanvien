<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Quách Gia BBQ - Nhân viên</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--primary:#8B0000;--primary-dark:#5c0000;--accent:#d4a017;--bg:#f5f0eb;--text:#333;--success:#2e7d32;--danger:#c62828;--info:#1565c0;--radius:12px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
.header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:17px;font-weight:700}
.header .user-info{display:flex;align-items:center;gap:8px}
.header .user-name{font-size:13px;font-weight:600}
.header .user-id{font-size:10px;opacity:.7}
.header-btns{display:flex;gap:6px}
.header-btn{background:rgba(255,255,255,.2);border:none;color:white;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px}
.container{max-width:600px;margin:0 auto;padding:12px}
.card{background:white;border-radius:var(--radius);box-shadow:0 2px 12px rgba(0,0,0,.06);padding:16px;margin-bottom:14px}
.card-title{font-size:15px;font-weight:700;color:var(--primary);margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tab-bar{display:flex;gap:0;background:white;border-radius:var(--radius);margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-btn{flex:1;padding:12px 8px;border:none;background:none;font-weight:600;font-size:12px;cursor:pointer;color:#999;white-space:nowrap;transition:all .2s;border-bottom:3px solid transparent;min-width:0}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);background:rgba(139,0,0,.04)}
.tab-btn i{display:block;font-size:16px;margin-bottom:3px}
.tab-content{display:none}.tab-content.active{display:block}
.btn{padding:12px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .2s}
.btn:active{opacity:.8}
.btn-success{background:var(--success);color:white}
.btn-primary{background:var(--primary);color:white}
.no-data{text-align:center;padding:40px 20px;color:#999;font-size:14px}
.no-data i{font-size:32px;display:block;margin-bottom:10px;opacity:.4}
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#f5f0eb,#e8e0d8);padding:20px}
.login-box{background:white;border-radius:16px;padding:32px 24px;width:100%;max-width:380px;box-shadow:0 8px 30px rgba(0,0,0,.12)}
.login-box h2{text-align:center;color:var(--primary);margin-bottom:4px;font-size:22px}
.login-box .subtitle{text-align:center;color:#888;font-size:13px;margin-bottom:24px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#555}
.form-group input,.form-group textarea{width:100%;padding:12px 14px;border:2px solid #e0e0e0;border-radius:10px;font-size:15px;transition:border-color .2s;font-family:inherit}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--primary)}
.login-btn{width:100%;padding:14px;background:var(--primary);color:white;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer}
.login-btn:active{background:var(--primary-dark)}
.error-msg{color:var(--danger);font-size:13px;text-align:center;margin-top:10px;display:none}
.reg-summary-box{background:#f0faf0;border:2px solid #c8e6c9;border-radius:var(--radius);padding:16px}
.reg-summary-title{font-weight:700;color:var(--success);margin-bottom:12px;font-size:15px;display:flex;align-items:center;gap:8px}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #e0e0e0;font-size:14px}
.sum-row:last-of-type{border-bottom:none}
.sum-day{font-weight:600;min-width:80px}
.sum-off{color:var(--danger);font-weight:600;font-size:13px}
.sum-shift{color:var(--info);font-weight:600;font-size:13px}
.reg-card{background:white;border-radius:var(--radius);margin-bottom:12px;overflow:hidden;border:2px solid #e8e8e8;transition:all .2s}
.reg-card-header{padding:12px 14px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between}
.reg-day-label{font-weight:700;font-size:15px}
.reg-day-label.weekend{color:var(--accent)}
.reg-day-label .required{color:var(--danger);font-size:12px}
.reg-options{padding:8px 14px}
.reg-opt{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f8f8f8;gap:12px;cursor:pointer;-webkit-user-select:none;user-select:none}
.reg-opt:last-child{border-bottom:none}
.reg-opt input[type="checkbox"]{width:22px;height:22px;accent-color:var(--primary);cursor:pointer;flex-shrink:0}
.reg-opt-label{font-size:14px;font-weight:500;flex:1}
.reg-opt-time{font-size:12px;color:#888}
.reg-opt.off-opt .reg-opt-label{color:var(--danger)}
.reg-custom-time{display:none;padding:8px 0 4px 34px;gap:8px;align-items:center}
.reg-custom-time.show{display:flex}
.time-select{padding:8px 6px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;font-weight:600;background:white;color:var(--text);min-width:70px;text-align:center;-webkit-appearance:none;appearance:none;cursor:pointer}
.time-select:focus{border-color:var(--primary);outline:none}
.time-separator{font-size:16px;font-weight:700;color:#ccc;padding:0 4px}
.reg-reason-box{display:none;padding:4px 0 8px 34px}
.reg-reason-box.show{display:block}
.reg-reason-box textarea{width:100%;padding:10px;border:2px solid #ffe082;border-radius:8px;font-size:13px;resize:none;height:50px;background:#fffde7;font-family:inherit}
.reg-reason-box .reason-hint{font-size:11px;color:var(--accent);font-weight:700;margin-bottom:4px}
.reg-status{background:#e8f5e9;border-radius:var(--radius);padding:20px;text-align:center;margin-bottom:14px}
.reg-status i{font-size:36px;color:var(--success);margin-bottom:8px;display:block}
.reg-status .msg{font-size:15px;font-weight:700;color:var(--success);margin-bottom:4px}
.reg-status .sub{font-size:12px;color:#888}
.reg-edit-info{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;background:#fff3e0;border-radius:8px;font-size:12px;color:#e65100;font-weight:600;margin-bottom:12px}
.schedule-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:10px}
@media(max-width:600px){.schedule-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:601px) and (max-width:800px){.schedule-grid{grid-template-columns:repeat(4,1fr)}}
.schedule-card{background:#f8f8f8;border-radius:12px;padding:14px 8px;text-align:center;border:2px solid #e8e8e8;transition:transform .15s}
.schedule-card.has-shift{border-color:#66bb6a;background:linear-gradient(135deg,#e8f5e9,#f1f8f1)}
.schedule-card.weekend{background:linear-gradient(135deg,#fffde7,#fff9c4);border-color:#ffe082}
.schedule-card.weekend.has-shift{border-color:#66bb6a;background:linear-gradient(135deg,#e8f5e9,#f1f8f1)}
.schedule-card.off-day{border-color:#ef9a9a;background:linear-gradient(135deg,#ffebee,#fce4ec)}
.schedule-card .sc-day{font-size:13px;color:#8B0000;font-weight:800;text-transform:uppercase;letter-spacing:1px}
.schedule-card .sc-fulldate{font-size:11px;color:#888;margin:2px 0 6px}
.schedule-card .sc-date{font-size:28px;font-weight:900;margin:2px 0;color:#333}
.schedule-card .sc-shift{color:#2e7d32;font-weight:800;font-size:14px;margin-top:6px;background:#c8e6c9;padding:4px 8px;border-radius:6px;display:inline-block}
.schedule-card .sc-off{color:#c62828;font-size:13px;margin-top:6px;font-weight:700}
.team-schedule-table{width:100%;border-collapse:separate;border-spacing:0;font-size:12px;margin-top:8px}
.team-schedule-table th{background:linear-gradient(135deg,#8B0000,#5c0000);color:white;padding:6px 3px;text-align:center;font-size:10px;font-weight:700;position:sticky;top:0;z-index:2}
.team-schedule-table th:first-child{position:sticky;left:0;z-index:3;min-width:90px}
.team-schedule-table td{padding:4px 2px;border:1px solid #e0e0e0;text-align:center;font-size:10px;vertical-align:top;background:white}
.team-schedule-table tr:nth-child(even) td{background:#fafafa}
.team-schedule-table .emp-name{text-align:left;font-weight:700;font-size:10px;padding-left:6px;white-space:nowrap;position:sticky;left:0;z-index:1;background:white;border-right:2px solid #8B0000;min-width:70px}
.team-schedule-table tr:nth-child(even) .emp-name{background:#fafafa}
.team-schedule-table .shift-badge{padding:2px 4px;border-radius:3px;font-weight:700;font-size:9px;display:inline-block;margin:1px 0}
.team-schedule-table .shift-sang{background:#fff3e0;color:#e65100;border:1px solid #ffcc80}
.team-schedule-table .shift-trua{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9}
.team-schedule-table .shift-toi{background:#ede7f6;color:#4527a0;border:1px solid #b39ddb}
.team-schedule-table .shift-other{background:#e8f5e9;color:#1b5e20;border:1px solid #a5d6a7}
.team-schedule-table .off-badge{background:#ffebee;color:#c62828;padding:3px 6px;border-radius:4px;font-weight:700;font-size:10px;display:inline-block}
.team-schedule-table .we-col{background:#fffde7}
.team-schedule-table tr:nth-child(even) .we-col{background:#fff9c4}
.task-badge{font-size:8px;padding:1px 4px;border-radius:3px;color:white;display:inline-block;margin:1px 0;font-weight:600}

.att-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.att-table th{background:linear-gradient(135deg,#8B0000,#5c0000);color:white;padding:10px 6px;text-align:center;font-size:11px;font-weight:700}
.att-table td{padding:8px 6px;border-bottom:1px solid #f0f0f0;text-align:center;font-size:12px}
.att-table tr:nth-child(even){background:#fafafa}
.att-table tr:hover{background:#fff3e0}
.att-table tr.weekend-row{background:#fffde7}
.att-table tr.weekend-row:hover{background:#fff9c4}
.att-table .total-row{background:linear-gradient(135deg,#e8f5e9,#c8e6c9);font-weight:800;font-size:13px}
.att-table .total-row:hover{background:linear-gradient(135deg,#c8e6c9,#a5d6a7)}
.att-table .day-col{font-weight:700;color:#333;min-width:60px}
.att-table .time-in{color:#2e7d32;font-weight:600}
.att-table .time-out{color:#c62828;font-weight:600}
.att-table .hours-col{font-weight:700}
.att-table .nc-col{color:#1565c0;font-weight:700}
.att-table .no-data-cell{color:#ccc;font-size:11px}
.att-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.att-summary-card{background:linear-gradient(135deg,#f8f8f8,#fff);border-radius:10px;padding:12px;text-align:center;border:1px solid #e0e0e0}
.att-summary-card .att-s-value{font-size:22px;font-weight:900;color:#8B0000}
.att-summary-card .att-s-label{font-size:11px;color:#888;margin-top:4px}
.att-late-banner{background:#fff3e0;border:1px solid #ffe082;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:#e65100}
.pay-row{display:flex;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #f5f5f5;font-size:14px}
.pay-row.highlight{background:linear-gradient(135deg,#e8f5e9,#c8e6c9);font-weight:700;font-size:16px;border-radius:10px;margin-top:10px;border:none}
.pay-label{color:#666}.pay-value{font-weight:700}
.status-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700}
.status-published{background:#e8f5e9;color:#2e7d32}
.status-unpublished{background:#fff3e0;color:#e65100}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:12px 24px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;display:none;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:9998;align-items:flex-end;justify-content:center}
.modal-overlay.active{display:flex}
.modal-box{background:white;border-radius:16px 16px 0 0;width:100%;max-width:500px;padding:24px;max-height:80vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-box h3{font-size:16px;margin-bottom:16px;color:var(--primary);display:flex;align-items:center;gap:8px}
.modal-close{margin-left:auto;border:none;background:none;font-size:22px;cursor:pointer;color:#999;padding:4px}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div id="loginPage" class="login-page">
  <div class="login-box">
    <h2><i class="fas fa-fire"></i> Quách Gia BBQ</h2>
    <div class="subtitle">Hệ thống nhân viên</div>
    <div class="form-group"><label>Mã nhân viên</label><input type="text" id="loginEmpId" placeholder="VD: PTNV016" autocomplete="off"></div>
    <div class="form-group"><label>Mật khẩu</label><input type="password" id="loginPassword" placeholder="Mật khẩu"></div>
    <div style="text-align:center;font-size:12px;color:#888;margin-bottom:12px"><i class="fas fa-lock" style="font-size:11px"></i> Mật khẩu sẽ được lưu tự động 密碼將自動保存</div>
    <button class="login-btn" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> Đăng nhập</button>
    <div class="error-msg" id="loginError"></div>
  </div>
</div>
<div id="mainApp" style="display:none">
  <div class="header">
    <h1><i class="fas fa-fire"></i> QG BBQ</h1>
    <div class="user-info">
      <div><div class="user-name" id="headerName"></div><div class="user-id" id="headerEmpId"></div></div>
      <div class="header-btns">
        <button class="header-btn" onclick="showChangePwModal()" title="Đổi mật khẩu"><i class="fas fa-key"></i></button>
        <button class="header-btn" onclick="doLogout()" title="Đăng xuất"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>
  </div>
  <div class="container">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('register',this)"><i class="fas fa-calendar-plus"></i>Đăng ký</button>
      <button class="tab-btn" onclick="switchTab('schedule',this)"><i class="fas fa-calendar-alt"></i>Lịch làm</button>
      <button class="tab-btn" onclick="switchTab('attendance',this)"><i class="fas fa-clock"></i>Chấm công</button>
      <button class="tab-btn" onclick="switchTab('payroll',this)"><i class="fas fa-wallet"></i>Lương</button>
    </div>
    <div id="tabRegister" class="tab-content active">
      <div class="card">
        <div class="card-title"><i class="fas fa-calendar-plus"></i> Đăng ký ca</div>
        <div id="regLoadingIndicator" style="text-align:center;padding:30px 10px"><i class="fas fa-spinner fa-spin" style="font-size:24px;color:#8B0000"></i><div style="margin-top:10px;color:#888;font-size:13px">Đang tải lịch đăng ký ca...</div></div>
        <div id="registerWeekLabel" style="font-size:13px;color:#888;margin-bottom:8px;font-weight:600"></div>
        <div id="regEditInfo"></div>
        <div id="registerContent"></div>
        <div id="regSubmitArea" style="margin-top:16px;display:none">
          <button class="btn btn-success" id="btnSubmitReg" onclick="submitRegistration()"><i class="fas fa-paper-plane"></i> Gửi đăng ký</button>
        </div>
        <div id="regDoneStatus" style="display:none"></div>
        <div id="regSummary" style="display:none"></div>
      </div>
    </div>
    <div id="tabSchedule" class="tab-content">
      <div class="card">
        <div class="card-title" style="flex-wrap:wrap;gap:8px"><span><i class="fas fa-calendar-alt"></i> Lịch của tôi</span> <span id="scheduleStatus" class="status-badge status-unpublished">Chưa phát</span><button onclick="saveMyScheduleImage()" style="margin-left:auto;background:#2e7d32;color:white;border:none;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer"><i class="fas fa-download"></i> Lưu ảnh</button></div>
        <div id="scheduleContent"><div class="no-data"><i class="fas fa-calendar-times"></i>Boss chưa phát lịch làm.</div></div>
      </div>
      <div class="card" style="margin-top:12px">
        <div class="card-title" style="flex-wrap:wrap;gap:8px">
          <span><i class="fas fa-users"></i> Lịch tổng nhân viên</span>
          <div style="margin-left:auto;display:flex;gap:6px">
            <button onclick="loadTeamSchedule()" style="background:#1565c0;color:white;border:none;padding:6px 10px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer"><i class="fas fa-sync-alt"></i></button>
            <button onclick="saveAllTeamScheduleImage()" style="background:#2e7d32;color:white;border:none;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer"><i class="fas fa-download"></i> Lưu ảnh</button>
          </div>
        </div>
        <div id="teamScheduleContent"><div class="no-data"><i class="fas fa-users"></i>Đang tải...</div></div>
      </div>
    </div>
    <div id="tabAttendance" class="tab-content">
      <div class="card">
        <div class="card-title"><i class="fas fa-clock"></i> Chấm công <select id="attMonth" onchange="loadAttendance()" style="margin-left:auto;padding:6px 10px;border:2px solid #e0e0e0;border-radius:8px;font-size:13px;font-weight:600"></select></div>
        <div id="attendanceContent"><div class="no-data"><i class="fas fa-clipboard-list"></i>Chưa có dữ liệu.</div></div>
      </div>
    </div>
    <div id="tabPayroll" class="tab-content">
      <div class="card">
        <div class="card-title"><i class="fas fa-wallet"></i> Bảng lương <span id="payrollStatus" class="status-badge status-unpublished" style="margin-left:auto">Chưa phát</span> <select id="payMonth" onchange="loadPayroll()" style="padding:6px 10px;border:2px solid #e0e0e0;border-radius:8px;font-size:13px;font-weight:600"></select></div>
        <div id="payrollSubTabs" style="display:none">
          <div style="display:flex;gap:0;border-bottom:2px solid #e0e0e0;margin-bottom:12px">
            <button class="pay-sub-tab active" onclick="switchPayTab('chamcong')" id="payTabCC" style="flex:1;padding:10px 8px;border:none;background:none;font-weight:700;font-size:13px;cursor:pointer;color:#999;border-bottom:3px solid transparent"><i class="fas fa-clipboard-list"></i> Chấm công</button>
            <button class="pay-sub-tab" onclick="switchPayTab('chitiet')" id="payTabCT" style="flex:1;padding:10px 8px;border:none;background:none;font-weight:700;font-size:13px;cursor:pointer;color:#999;border-bottom:3px solid transparent"><i class="fas fa-file-invoice-dollar"></i> Chi tiết lương</button>
          </div>
          <div style="text-align:right;margin-bottom:10px">
            <button id="payDownloadBtn" onclick="downloadPayrollImage()" style="background:var(--success);color:white;border:none;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer"><i class="fas fa-download"></i> Tải ảnh</button>
          </div>
        </div>
        <div id="payrollContent"><div class="no-data"><i class="fas fa-file-invoice-dollar"></i>Boss chưa phát bảng lương.</div></div>
      </div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="changePwModal">
  <div class="modal-box">
    <h3><i class="fas fa-key"></i> Đổi mật khẩu <button class="modal-close" onclick="closeModal('changePwModal')">&times;</button></h3>
    <div class="form-group"><label>Mật khẩu cũ</label><input type="password" id="oldPw" placeholder="Nhập mật khẩu hiện tại"></div>
    <div class="form-group"><label>Mật khẩu mới</label><input type="password" id="newPw" placeholder="Nhập mật khẩu mới"></div>
    <div class="form-group"><label>Xác nhận</label><input type="password" id="confirmPw" placeholder="Nhập lại mật khẩu mới"></div>
    <button class="btn btn-primary" onclick="doChangePassword()"><i class="fas fa-save"></i> Lưu mật khẩu</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var API_URL='https://script.google.com/macros/s/AKfycbzQBhNS_FhLo-biBQ_tRsJEekAVWqXFYw8bOAeAHJDm6fewT0KAjaCCuAXPdODv4BUW/exec';
var currentUser=null;
var dayNames=['CN','T2','T3','T4','T5','T6','T7'];
var currentWeekKey='';
var regEditCount=0;
var SHIFTS=[
  {id:'sang',label:'Ca sáng',start:'09:00',end:'14:00',color:'#fff3e0'},
  {id:'trua',label:'Ca trưa',start:'11:00',end:'18:00',color:'#e3f2fd'},

function timeOptions(selected){
  var h='';
  for(var hr=6;hr<=23;hr++){for(var mn=0;mn<60;mn+=30){
    var val=String(hr).padStart(2,'0')+':'+String(mn).padStart(2,'0');
    h+='<option value="'+val+'"'+(val===selected?' selected':'')+'>'+val+'</option>';
  }}return h;
}
function getWeekKey(date){
  var d=new Date(date);d.setHours(0,0,0,0);
  d.setDate(d.getDate()+3-(d.getDay()+6)%7);
  var week1=new Date(d.getFullYear(),0,4);
  var weekNum=1+Math.round(((d-week1)/86400000-3+(week1.getDay()+6)%7)/7);
  return d.getFullYear()+'-W'+String(weekNum).padStart(2,'0');
}
function apiCall(params,callback){
  var qs=Object.keys(params).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);}).join('&');
  var url=API_URL;
  var fullUrl=url+'?'+qs;
  var opts=qs.length>1500?{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:qs,redirect:'follow'}:{redirect:'follow'};
  var fetchUrl=qs.length>1500?url:fullUrl;
  var done=false;
  var timer=setTimeout(function(){if(!done){done=true;console.warn('API timeout 60s for action:',params.action);callback({success:false,error:'Timeout 60s - thử lại sau'});}},60000);
  fetch(fetchUrl,opts).then(function(r){return r.text();}).then(function(txt){
    if(done)return;done=true;clearTimeout(timer);
    try{callback(JSON.parse(txt));}catch(e){console.warn('API parse error:',txt.substring(0,300));callback({success:false,error:'Lỗi server response'});}
  }).catch(function(err){if(done)return;done=true;clearTimeout(timer);console.warn('API error:',err);callback({success:false,error:'Lỗi kết nối: '+err.message});});
}

var regPeriodStart='';
var regPeriodEnd='';

function normalizeDate(s){
  // Convert any date format to YYYY-MM-DD
  if(!s)return '';
  s=String(s).trim();
  // Already YYYY-MM-DD?
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  // Try parsing as Date object string (e.g. "Sun May 25 2026...")
  var d=new Date(s);
  if(!isNaN(d.getTime())){
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  return s;
}

function loadRegisterWeek(){
  // Fetch active period from server
  apiCall({action:'getRegPeriod'},function(res){
    if(res.success&&res.startDate&&res.endDate){
      regPeriodStart=normalizeDate(res.startDate);
      regPeriodEnd=normalizeDate(res.endDate);
      currentWeekKey=regPeriodStart+'_'+regPeriodEnd;
    } else {
      // Fallback: next Monday to Sunday
      var now=new Date();var dow=now.getDay();
      var diff=(1-dow+7)%7;if(diff===0)diff=7;
      var nextMon=new Date(now);nextMon.setDate(now.getDate()+diff);
      var nextSun=new Date(nextMon);nextSun.setDate(nextMon.getDate()+6);
      regPeriodStart=nextMon.getFullYear()+'-'+String(nextMon.getMonth()+1).padStart(2,'0')+'-'+String(nextMon.getDate()).padStart(2,'0');
      regPeriodEnd=nextSun.getFullYear()+'-'+String(nextSun.getMonth()+1).padStart(2,'0')+'-'+String(nextSun.getDate()).padStart(2,'0');
      currentWeekKey=regPeriodStart+'_'+regPeriodEnd;
    }
    // Now check lock + existing registration
    var lockResult=null,regResult=null,done=0;
    function checkDone(){
      done++;if(done<2)return;
      if(lockResult&&lockResult.success&&lockResult.locked){showRegLocked();return;}
      regEditCount=(regResult&&regResult.success?regResult.editCount:0)||0;
      renderRegisterForm(regResult&&regResult.success?regResult:null);
    }
    apiCall({action:'getRegLock',weekKey:currentWeekKey},function(r){lockResult=r;checkDone();});
    apiCall({action:'getMyRegistration',empId:currentUser.empId,weekKey:currentWeekKey},function(r){regResult=r;checkDone();});
  });
}

function showRegLocked(){
  document.getElementById('regLoadingIndicator').style.display='none';

  var weekLabel=sd.getDate()+'/'+(sd.getMonth()+1)+' - '+ed.getDate()+'/'+(ed.getMonth()+1)+'/'+ed.getFullYear();
  document.getElementById('registerWeekLabel').textContent=weekLabel;
  document.getElementById('regEditInfo').innerHTML='';
  document.getElementById('registerContent').style.display='none';
  document.getElementById('regSubmitArea').style.display='none';
  document.getElementById('regSummary').style.display='none';
  document.getElementById('regDoneStatus').style.display='block';
  document.getElementById('regDoneStatus').innerHTML='<div class="reg-status" style="background:#fff3e0"><i class="fas fa-lock" style="color:#e65100"></i><div class="msg" style="color:#e65100">Đăng ký đã bị khóa</div><div class="sub">Quản lý đã khóa đăng ký ca. Liên hệ quản lý nếu cần thay đổi.</div></div>';
}

var _lastRegExistingData=null;
function renderRegisterForm(existingData){
  _lastRegExistingData=existingData;
  document.getElementById('regLoadingIndicator').style.display='none';
  var existing={};
  if(existingData&&existingData.shifts){existingData.shifts.forEach(function(s){
    // Normalize times from API (Google Sheets may return Date objects as strings)
    s.start=normalizeTime(s.start||'');
    s.end=normalizeTime(s.end||'');
    existing[s.date]=s;
  });}
  var editInfoEl=document.getElementById('regEditInfo');
  var locked=regEditCount>=2;

  if(locked){
    editInfoEl.innerHTML='<div class="reg-edit-info"><i class="fas fa-lock"></i> Đã dùng hết 2 lượt</div>';
    document.getElementById('regSubmitArea').style.display='none';
    document.getElementById('registerContent').style.display='none';
    document.getElementById('regDoneStatus').style.display='block';
    document.getElementById('regDoneStatus').innerHTML='<div class="reg-status"><i class="fas fa-check-circle"></i><div class="msg">Đã hoàn tất đăng ký ca</div><div class="sub">Đã sử dụng 2/2 lượt. Liên hệ quản lý nếu cần thay đổi.</div></div>';
    document.getElementById('regSummary').style.display='none';
  } else if(regEditCount===1){
    editInfoEl.innerHTML='<div class="reg-edit-info" style="background:#e8f5e9;color:var(--success)"><i class="fas fa-check-circle"></i> Đã đăng ký thành công (còn 1 lần chỉnh sửa)</div>';
    document.getElementById('regSubmitArea').style.display='none';
    document.getElementById('registerContent').style.display='none';
    document.getElementById('regDoneStatus').style.display='none';
    showRegSummary(existingData, true);
  } else {
    editInfoEl.innerHTML='';
    document.getElementById('regSubmitArea').style.display='block';
    document.getElementById('registerContent').style.display='block';
    document.getElementById('regDoneStatus').style.display='none';
    document.getElementById('regSummary').style.display='none';
    document.getElementById('btnSubmitReg').innerHTML='<i class="fas fa-paper-plane"></i> Gửi đăng ký';
  }

  // Build dates from regPeriodStart to regPeriodEnd
  var startD=new Date(regPeriodStart+'T00:00:00');
  var endD=new Date(regPeriodEnd+'T00:00:00');
  var weekLabel=startD.getDate()+'/'+(startD.getMonth()+1)+' - '+endD.getDate()+'/'+(endD.getMonth()+1)+'/'+endD.getFullYear();

  var h='';var idx=0;
  var cur=new Date(startD);
  while(cur<=endD){
    var dateStr=cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');
    var dw=cur.getDay();var isWE=dw===0||dw===6;
    var dayLabel=dayNames[dw]+' ('+String(cur.getDate()).padStart(2,'0')+'/'+String(cur.getMonth()+1).padStart(2,'0')+')';

    var ex=existing[dateStr];var exStart=ex?ex.start:'';var exEnd=ex?ex.end:'';var exReason=ex?(ex.offReason||''):'';
    var selectedShifts=[];var isOff=false;var isCustom=false;var customStart='08:00';var customEnd='15:00';
    if(ex){
      if(!exStart&&!exEnd){isOff=true;}
      else{
        var parts=exStart.split(',');var endParts=exEnd.split(',');
        for(var p=0;p<parts.length;p++){
          var matchedPreset=false;
          for(var si=0;si<SHIFTS.length;si++){if(parts[p]===SHIFTS[si].start&&endParts[p]===SHIFTS[si].end){selectedShifts.push(SHIFTS[si].id);matchedPreset=true;break;}}
          if(!matchedPreset&&parts[p]){isCustom=true;customStart=parts[p];customEnd=endParts[p]||'23:00';}
        }
      }
    }

    h+='<div class="reg-card" data-date="'+dateStr+'" data-weekend="'+(isWE?'1':'0')+'" data-idx="'+idx+'">';
    h+='<div class="reg-card-header"><div class="reg-day-label'+(isWE?' weekend':'')+'">'+dayLabel+(isWE?' <span class="required">*</span>':'')+'</div></div>';
    h+='<div class="reg-options">';
    SHIFTS.forEach(function(s){
      var checked=selectedShifts.indexOf(s.id)>=0;
      h+='<label class="reg-opt" style="background:'+s.color+';border-radius:8px;padding:10px 12px;margin-bottom:4px">';
      h+='<input type="checkbox" class="shift-cb" data-shift="'+s.id+'" data-start="'+s.start+'" data-end="'+s.end+'"'+(checked?' checked':'')+(locked?' disabled':'')+' onchange="onShiftChange(this)">';
      h+='<span class="reg-opt-label">'+s.label+'</span><span class="reg-opt-time">'+s.start+' - '+s.end+'</span></label>';
    });
    h+='<label class="reg-opt off-opt"><input type="checkbox" class="off-cb"'+(isOff?' checked':'')+(locked?' disabled':'')+' onchange="onOffChange(this)"><span class="reg-opt-label"><i class="fas fa-ban"></i> OFF</span></label>';
    h+='<div class="reg-reason-box'+(isOff&&isWE?' show':'')+'"><div class="reason-hint"><i class="fas fa-comment-dots"></i> Lý do nghỉ T7/CN:</div><textarea class="reg-off-reason" placeholder="VD: Có lịch học, việc gia đình..."'+(locked?' disabled':'')+'>'+exReason+'</textarea></div>';
    h+='<label class="reg-opt"><input type="checkbox" class="custom-cb"'+(isCustom?' checked':'')+(locked?' disabled':'')+' onchange="onCustomChange(this)"><span class="reg-opt-label"><i class="fas fa-clock"></i> Thời gian khác</span></label>';
    h+='<div class="reg-custom-time'+(isCustom?' show':'')+'"><select class="time-select custom-start"'+(locked?' disabled':'')+'>'+timeOptions(customStart)+'</select><span class="time-separator">~</span><select class="time-select custom-end"'+(locked?' disabled':'')+'>'+timeOptions(customEnd)+'</select></div>';
    h+='</div></div>';
    cur.setDate(cur.getDate()+1);idx++;
  }
  document.getElementById('registerWeekLabel').textContent=weekLabel;
  document.getElementById('registerContent').innerHTML=h;
}

function onShiftChange(cb){var card=cb.closest('.reg-card');if(cb.checked){var offCb=card.querySelector('.off-cb');if(offCb){offCb.checked=false;}hideReason(card);}}
function onOffChange(cb){var card=cb.closest('.reg-card');if(cb.checked){card.querySelectorAll('.shift-cb,.custom-cb').forEach(function(c){c.checked=false;});card.querySelector('.reg-custom-time').classList.remove('show');if(card.getAttribute('data-weekend')==='1'){card.querySelector('.reg-reason-box').classList.add('show');}}else{hideReason(card);}}
function onCustomChange(cb){var card=cb.closest('.reg-card');var timeRow=card.querySelector('.reg-custom-time');if(cb.checked){timeRow.classList.add('show');var offCb=card.querySelector('.off-cb');if(offCb){offCb.checked=false;}hideReason(card);}else{timeRow.classList.remove('show');}}
function hideReason(card){card.querySelector('.reg-reason-box').classList.remove('show');}

function submitRegistration(){
  if(!API_URL){showToast('Chưa cấu hình API');return;}
  var cards=document.querySelectorAll('#registerContent .reg-card');
  var shifts=[];var hasError=false;
  cards.forEach(function(card){
    var dateStr=card.getAttribute('data-date');
    var isWE=card.getAttribute('data-weekend')==='1';
    var offCb=card.querySelector('.off-cb');var isOff=offCb&&offCb.checked;
    if(isOff){
      var reason='';
      if(isWE){var ta=card.querySelector('.reg-off-reason');reason=ta?ta.value.trim():'';if(!reason){hasError=true;if(ta){ta.style.borderColor='#c62828';ta.placeholder='Bắt buộc ghi lý do!';}}}
      shifts.push({date:dateStr,start:'',end:'',offReason:reason||'OFF',isOff:true});return;
    }
    var starts=[];var ends=[];
    card.querySelectorAll('.shift-cb:checked').forEach(function(cb){starts.push(cb.getAttribute('data-start'));ends.push(cb.getAttribute('data-end'));});
    var customCb=card.querySelector('.custom-cb');
    if(customCb&&customCb.checked){starts.push(card.querySelector('.custom-start').value);ends.push(card.querySelector('.custom-end').value);}
    if(starts.length===0){shifts.push({date:dateStr,start:'',end:'',offReason:''});}
    else{shifts.push({date:dateStr,start:starts.join(','),end:ends.join(','),offReason:''});}
  });
  if(hasError){showToast('Vui lòng ghi lý do nghỉ T7/CN');return;}
  var emptyDays=[];
  shifts.forEach(function(s){
    if(!s.start&&!s.end&&!s.offReason){
      var d=new Date(s.date);var dw=d.getDay();
      emptyDays.push(dayNames[dw]+' '+String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0'));
    }
  });
  if(emptyDays.length>0){showToast('Chưa chọn ca: '+emptyDays.join(', '));return;}
  var btn=document.getElementById('btnSubmitReg');
  btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Đang gửi...';btn.style.pointerEvents='none';
  apiCall({action:'registerShift',empId:currentUser.empId,weekKey:currentWeekKey,shifts:JSON.stringify(shifts)},function(res){
    if(res.success){
      regEditCount=res.editCount;
      if(res.remaining<=0){
        document.getElementById('regSubmitArea').style.display='none';
        document.getElementById('registerContent').style.display='none';
        document.getElementById('regDoneStatus').style.display='block';
        document.getElementById('regDoneStatus').innerHTML='<div class="reg-status"><i class="fas fa-check-circle"></i><div class="msg">Đã hoàn tất đăng ký ca!</div><div class="sub">Đã sử dụng 2/2 lượt.</div></div>';
        document.getElementById('regEditInfo').innerHTML='<div class="reg-edit-info"><i class="fas fa-lock"></i> Đã dùng hết 2 lượt</div>';
        showRegSummaryFromForm(false);
      } else {
        showToast('Đăng ký thành công!');
        document.getElementById('regEditInfo').innerHTML='<div class="reg-edit-info" style="background:#e8f5e9;color:var(--success)"><i class="fas fa-check-circle"></i> Đã đăng ký thành công (còn '+(res.remaining||1)+' lần chỉnh sửa)</div>';
        document.getElementById('regSubmitArea').style.display='none';
        document.getElementById('registerContent').style.display='none';
        showRegSummaryFromForm(true);
      }
    } else {
      showToast('Lỗi: '+res.error);
      btn.innerHTML='<i class="fas fa-paper-plane"></i> Gửi đăng ký';btn.style.pointerEvents='';
    }
  });
}

function showRegSummaryFromForm(showEditBtn){
  var cards=document.querySelectorAll('#registerContent .reg-card');
  var shifts=[];
  cards.forEach(function(card){
    var dateStr=card.getAttribute('data-date');
    var offCb=card.querySelector('.off-cb');var isOff=offCb&&offCb.checked;
    if(isOff){var ta=card.querySelector('.reg-off-reason');shifts.push({date:dateStr,start:'',end:'',offReason:ta?ta.value.trim():''});return;}
    var starts=[];var ends=[];
    card.querySelectorAll('.shift-cb:checked').forEach(function(cb){starts.push(cb.getAttribute('data-start'));ends.push(cb.getAttribute('data-end'));});
    var customCb=card.querySelector('.custom-cb');
    if(customCb&&customCb.checked){starts.push(card.querySelector('.custom-start').value);ends.push(card.querySelector('.custom-end').value);}
    shifts.push({date:dateStr,start:starts.join(','),end:ends.join(','),offReason:''});
  });
  document.getElementById('regSummary').innerHTML=buildSummaryHtml(shifts, showEditBtn!==false);
  document.getElementById('regSummary').style.display='block';
}
function buildSummaryHtml(shifts, showEditBtn){
  var h='<div class="reg-summary-box"><div class="reg-summary-title"><i class="fas fa-calendar-check"></i> Lịch đã đăng ký</div>';
  shifts.forEach(function(s){
    var d=new Date(s.date+'T00:00:00');var dw=d.getDay();
    var dayLabel=dayNames[dw]+' '+String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');
    var detail='';
    var startNorm=normalizeTime(s.start||'');
    var endNorm=normalizeTime(s.end||'');
    if(!startNorm&&!endNorm){var reason=s.offReason&&s.offReason!=='OFF'?s.offReason:'';detail='<span class="sum-off"><i class="fas fa-ban"></i> OFF'+(reason?' - '+reason:'')+'</span>';}
    else{
      var parts=startNorm.split(',');var endParts=endNorm.split(',');var labels=[];
      for(var p=0;p<parts.length;p++){
        var ps=parts[p].trim();var pe=endParts[p]?endParts[p].trim():'';
        var matched=false;
        for(var si=0;si<SHIFTS.length;si++){if(ps===SHIFTS[si].start&&pe===SHIFTS[si].end){labels.push(SHIFTS[si].label+' ('+SHIFTS[si].start+'-'+SHIFTS[si].end+')');matched=true;break;}}
        if(!matched&&ps)labels.push(ps+'-'+pe);
      }
      detail='<span class="sum-shift">'+labels.join(', ')+'</span>';
    }
    h+='<div class="sum-row"><span class="sum-day">'+dayLabel+'</span>'+detail+'</div>';
  });
  if(showEditBtn){h+='<button class="btn btn-primary" style="margin-top:16px" onclick="openEditReg()"><i class="fas fa-edit"></i> Chỉnh sửa đăng ký</button>';}
  h+='</div>';
  return h;
}
function openEditReg(){
  // Re-check lock status before allowing edit
  apiCall({action:'getRegLock',weekKey:currentWeekKey},function(r){
    if(r&&r.success&&r.locked){
      showToast('Đăng ký đã bị khóa bởi quản lý!');
      showRegLocked();
      return;
    }
    _doOpenEditReg();
  });
}
function _doOpenEditReg(){
  document.getElementById('regSummary').style.display='none';
  document.getElementById('regDoneStatus').style.display='none';

var dayNamesVN=['CN','T2','T3','T4','T5','T6','T7'];
var monthNamesVN=['','Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];

function normalizeTime(timeStr) {
  if (!timeStr) return '';
  var s = String(timeStr).trim();
  if (/^\d{1,2}:\d{2}$/.test(s)) return s.padStart(5,'0');
  if (s.indexOf(',') >= 0) return s.split(',').map(function(t){return normalizeTime(t.trim());}).join(',');
  var isoMatch = s.match(/T(\d{2}):(\d{2})/);
  if (isoMatch) return isoMatch[1]+':'+isoMatch[2];
  var dateStrMatch = s.match(/\d{4}\s+(\d{1,2}):(\d{2}):(\d{2})/);
  if (dateStrMatch) return String(parseInt(dateStrMatch[1])).padStart(2,'0')+':'+dateStrMatch[2];
  var hmsMatch = s.match(/^(\d{1,2}):(\d{2}):(\d{2})/);
  if (hmsMatch) return String(parseInt(hmsMatch[1])).padStart(2,'0')+':'+hmsMatch[2];
  return s;
}

function normalizeDate(dateStr) {
  if (!dateStr) return '';
  var s = String(dateStr).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  var d = new Date(s);
  if (isNaN(d.getTime())) return s;
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function getShiftColorClass(startTime) {
  var h = parseInt(startTime.split(':')[0]);
  if (h >= 7 && h < 11) return 'shift-sang';
  if (h >= 11 && h < 16) return 'shift-trua';
  if (h >= 16) return 'shift-toi';
  return 'shift-other';
}
function getShiftColor(startTime) {
  var h = parseInt(startTime.split(':')[0]);
  if (h >= 7 && h < 11) return {bg:'#fff3e0',text:'#e65100'};
  if (h >= 11 && h < 16) return {bg:'#e3f2fd',text:'#1565c0'};
  if (h >= 16) return {bg:'#ede7f6',text:'#4527a0'};
  return {bg:'#e8f5e9',text:'#1b5e20'};
}

// Parse task string: supports "name|icon|color;;name2|icon2|color2" (new) and "name,name2" (old)
function parseTaskStr(taskStr) {
  if (!taskStr) return [];
  var str = String(taskStr).trim();
  if (!str) return [];
  var tasks = [];
  // Split by ;; first (multiple tasks), then handle each part
  var parts = str.indexOf(';;') >= 0 ? str.split(';;') : [str];
  parts.forEach(function(part) {
    part = part.trim();
    if (!part) return;
    if (part.indexOf('|') >= 0) {
      // New format: name|icon|color
      var p = part.split('|');
      if (p[0] && p[0].trim()) tasks.push({name:p[0].trim(), icon:p[1]||'fa-circle', color:p[2]||'#546e7a'});
    } else {
      // Old format: plain name (might be comma-separated)
      part.split(',').forEach(function(t) {
        if (t.trim()) tasks.push({name:t.trim(), icon:'fa-circle', color:'#546e7a'});
      });
    }
  });
  return tasks;
}
// Collect unique tasks for legend
function collectTaskLegend(scheduleList) {
  var seen = {};
  var legend = [];
  scheduleList.forEach(function(s) {
    var tasks = parseTaskStr(s.task);
    tasks.forEach(function(t) {
      if (!seen[t.name]) { seen[t.name] = true; legend.push(t); }
    });
  });
  return legend;
}
function renderTaskLegendHtml(legend) {
  if (legend.length === 0) return '';
  var h = '<div style="display:flex;flex-wrap:wrap;gap:6px;padding:8px 4px;margin-top:6px;border-top:1px solid #eee">';
  h += '<span style="font-size:10px;color:#888;font-weight:600;margin-right:2px"><i class="fas fa-info-circle"></i> Task:</span>';
  legend.forEach(function(t) {
    h += '<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;color:#555"><i class="fas '+(t.icon||'fa-circle')+'" style="color:'+t.color+';font-size:12px"></i> '+t.name+'</span>';
  });
  h += '</div>';
  return h;
}

function renderTeamSchedule(empList, schedule, container) {
  if (!schedule || schedule.length === 0) {
    container.innerHTML = '<div class="no-data"><i class="fas fa-calendar-times"></i>Boss chưa phát lịch làm.</div>';
    return;
  }
  // Build lookup: empId -> date -> {start, end, color, task, dept, empName}
  var lookup = {};
  var allDates = {};
  var empDepts = {};
  schedule.forEach(function(s) {
    var eid = String(s.empId).trim();
    var dateStr = normalizeDate(s.date);
    if (!lookup[eid]) lookup[eid] = {};
    lookup[eid][dateStr] = { start: normalizeTime(s.start), end: normalizeTime(s.end), color: s.color||'', task: s.task||'' };
    allDates[dateStr] = true;
    if (s.dept) empDepts[eid] = s.dept;
    if (s.empName && !empDepts['_name_'+eid]) empDepts['_name_'+eid] = s.empName;
  });
  var dates = Object.keys(allDates).sort();
  if (dates.length === 0) {
    container.innerHTML = '<div class="no-data"><i class="fas fa-calendar-times"></i>Chưa có dữ liệu.</div>';
    return;
  }
  var empMap = {};
  empList.forEach(function(e) { empMap[e.id] = e.name; if(e.dept) empDepts[e.id] = e.dept; });
  // Merge empName from schedule data
  Object.keys(empDepts).forEach(function(k){ if(k.startsWith('_name_')){ var eid=k.substring(6); if(!empMap[eid]) empMap[eid]=empDepts[k]; }});
  // Group by dept
  var deptEmps = {'Bếp':[], 'Phục vụ':[], 'Khác':[]};
  var allEmpIds = [];
  empList.forEach(function(e) { if (lookup[e.id]) allEmpIds.push(e.id); });
  // Also add emp ids from schedule that may not be in empList
  Object.keys(lookup).forEach(function(eid){ if(allEmpIds.indexOf(eid)<0) allEmpIds.push(eid); });
  allEmpIds.forEach(function(eid) {
    var dept = empDepts[eid] || 'Khác';
    if (dept === 'Rửa chén') dept = 'Bếp';
    if (!deptEmps[dept]) dept = 'Khác';
    deptEmps[dept].push(eid);
  });
  if (allEmpIds.length === 0) {
    container.innerHTML = '<div class="no-data"><i class="fas fa-calendar-times"></i>Chưa có lịch được phát.</div>';
    return;
  }
  var firstD = new Date(dates[0]+'T00:00:00');
  var lastD = new Date(dates[dates.length-1]+'T00:00:00');

  function buildDeptTable(title, empIds, captureId) {
    if (empIds.length === 0) return '';
    var h = '';
    h += '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:12px"><div id="'+captureId+'" style="background:white;padding:10px;border-radius:10px">';
    h += '<div style="text-align:center;margin-bottom:8px;font-weight:800;font-size:14px;color:#8B0000"><i class="fas fa-calendar-alt"></i> LỊCH LÀM VIỆC - QUÁCH GIA ('+title+')</div>';
    h += '<div style="text-align:center;margin-bottom:8px;font-size:11px;color:#666">'+firstD.getDate()+'/'+(firstD.getMonth()+1)+' - '+lastD.getDate()+'/'+(lastD.getMonth()+1)+'/'+lastD.getFullYear()+'</div>';
    h += '<table class="team-schedule-table"><thead><tr><th style="text-align:left;padding-left:8px">Nhân viên</th>';
    dates.forEach(function(dateStr) {
      var d = new Date(dateStr+'T00:00:00');
      var dw = d.getDay();
      var isWE = dw===0||dw===6;
      h += '<th style="min-width:45px;'+(isWE?'background:#5c0000':'')+'">'+dayNamesVN[dw]+'<br>'+d.getDate()+'/'+(d.getMonth()+1)+'</th>';
    });
    h += '</tr></thead><tbody>';
    empIds.forEach(function(eid) {
      h += '<tr><td class="emp-name">' + (empMap[eid]||eid) + '</td>';
      dates.forEach(function(dateStr) {
        var d = new Date(dateStr+'T00:00:00');
        var dw = d.getDay();
        var isWE = dw===0||dw===6;
        var val = lookup[eid] && lookup[eid][dateStr];
        var weClass = isWE ? ' we-col' : '';
        if (val && val.start) {
          var sParts = val.start.split(','), eParts = val.end.split(',');
          var cellHtml = '';
          for (var si = 0; si < sParts.length; si++) {
            if (sParts[si]) {
              var badgeStyle = '';
              if (val.color) {
                badgeStyle = 'background:'+val.color+';color:white;border:1px solid '+val.color;
              }
              if (badgeStyle) {
                cellHtml += '<span class="shift-badge" style="'+badgeStyle+'">' + sParts[si] + '-' + (eParts[si]||'') + '</span>';
              } else {
                var sc = getShiftColorClass(sParts[si]);
                cellHtml += '<span class="shift-badge '+sc+'">' + sParts[si] + '-' + (eParts[si]||'') + '</span>';
              }
            }
          }
          if (val.task) {
            var parsedT = parseTaskStr(val.task);
            parsedT.forEach(function(t) {
              cellHtml += '<span title="'+t.name+'" style="display:inline-block;margin:1px"><i class="fas '+t.icon+'" style="color:'+t.color+';font-size:10px"></i></span>';
            });
          }
          h += '<td class="'+weClass.trim()+'">' + cellHtml + '</td>';
        } else {
          h += '<td class="'+weClass.trim()+'" style="background:#000"></td>';
        }
      });
      h += '</tr>';
    });
    h += '</tbody></table>';
    // Task legend for this dept
    var deptLegend = collectTaskLegend(schedule.filter(function(s){ 
      var eid = String(s.empId).trim();
      return empIds.indexOf(eid) >= 0;
    }));
    h += renderTaskLegendHtml(deptLegend);
    h += '</div></div>';
    return h;
  }

  var html = '';
  if (deptEmps['Bếp'].length > 0) html += buildDeptTable('Bếp', deptEmps['Bếp'], 'teamScheduleCapture_bep');
  if (deptEmps['Phục vụ'].length > 0) html += buildDeptTable('Phục vụ', deptEmps['Phục vụ'], 'teamScheduleCapture_pv');
  if (deptEmps['Khác'].length > 0) html += buildDeptTable('Khác', deptEmps['Khác'], 'teamScheduleCapture_khac');
  // Wrap everything in one capture div
  html = '<div id="teamScheduleCapture" style="background:white;padding:10px;border-radius:10px">' + html + '</div>';
  container.innerHTML = html;
}

    if(done>=2)renderAttendance(qrData,schedData,month);
  }else{
    apiCall({action:'getSchedule',empId:currentUser.empId},function(res){
      if(res.success&&res.schedule){
        // Build lookup: day -> {start, end} for this month
        var lookup={};
        res.schedule.forEach(function(s){
          var dateStr=normalizeDate(s.date);
          var ns=normalizeTime(s.start),ne=normalizeTime(s.end);
          lookup[dateStr]={start:ns,end:ne};
        });
        myScheduleCache=lookup;
        schedData=lookup;
      }
      checkBothDone();
    });
  }
}

function fetchQRData(month,callback){
  var cbName='_attCB_'+Date.now();
  var url='https://docs.google.com/spreadsheets/d/'+QR_SHEET_ID+'/gviz/tq?tqx=out:json;responseHandler:'+cbName+'&sheet='+encodeURIComponent(QR_SHEET_NAME);
  
  window[cbName]=function(resp){
    try{
      var rows=resp.table.rows;
      var parts=month.split('-');
      var targetY=parseInt(parts[0]),targetM=parseInt(parts[1]);
      var empId=currentUser.empId;
      var dayMap={};
      
      for(var i=1;i<rows.length;i++){
        var cells=rows[i].c;
        if(!cells||cells.length<6)continue;
        var dateStr=cells[1]?cells[1].v:'';
        var timeStr=cells[2]?cells[2].v:'';
        var rowEmpId=cells[3]?String(cells[3].v).trim():'';
        var loai=cells[5]?cells[5].v:'';
        if(!dateStr||!timeStr||!loai)continue;
        if(rowEmpId!==empId)continue;
        
        var dp=dateStr.split('/');
        if(dp.length!==3)continue;
        var dd=parseInt(dp[0]),mm=parseInt(dp[1]),yy=parseInt(dp[2]);
        if(yy!==targetY||mm!==targetM)continue;
        
        var hm=timeStr.substring(0,5);
        if(!dayMap[dd])dayMap[dd]={checkin:'',checkout:'',cinFull:'',coutFull:''};
        
        if(loai==='VÀO CA'){
          if(!dayMap[dd].cinFull||timeStr<dayMap[dd].cinFull){
            dayMap[dd].checkin=hm;dayMap[dd].cinFull=timeStr;
          }
        }else if(loai==='TAN CA'){
          if(!dayMap[dd].coutFull||timeStr>dayMap[dd].coutFull){
            dayMap[dd].checkout=hm;dayMap[dd].coutFull=timeStr;
          }
        }
      }
      
      var attendance=[];
      for(var day in dayMap){
        var rec=dayMap[day];
        if(!rec.checkin&&!rec.checkout)continue;
        var hrs=0;
        if(rec.checkin&&rec.checkout){
          var cin=rec.checkin.split(':'),cout=rec.checkout.split(':');
          hrs=((parseInt(cout[0])*60+parseInt(cout[1]))-(parseInt(cin[0])*60+parseInt(cin[1])))/60;
          if(hrs<0)hrs=0;
        }
        attendance.push({day:parseInt(day),checkin:rec.checkin,checkout:rec.checkout,hours:hrs});
      }
      callback(attendance.length>0?attendance:null);
    }catch(err){
      console.error('QR parse error:',err);
      callback(null);
    }
    delete window[cbName];
    var oldScript=document.getElementById('attJsonpScript');
    if(oldScript)oldScript.remove();
  };
  
  setTimeout(function(){if(window[cbName]){delete window[cbName];callback(null);}},15000);
  var script=document.createElement('script');
  script.id='attJsonpScript';script.src=url;
  document.body.appendChild(script);
}

function timeToMin(t){
  if(!t)return 0;
  var p=t.split(':');return parseInt(p[0])*60+parseInt(p[1]);
}

function renderAttendance(attendance,schedLookup,month){
  var parts=month.split('-');
  var year=parseInt(parts[0]),mon=parseInt(parts[1]);
  var totalH=0,workDays=0,totalOT=0,totalLate=0,lateCount=0,earlyLeaveCount=0;
  
  attendance.sort(function(a,b){return a.day-b.day;});
  
  // First pass: compute stats with schedule comparison
  attendance.forEach(function(a){
    var hrs=parseFloat(a.hours)||0;
    totalH+=hrs;
    if(hrs>0)workDays++;
    
    // Compare with schedule
    var dateStr=year+'-'+String(mon).padStart(2,'0')+'-'+String(a.day).padStart(2,'0');
    var sched=schedLookup?schedLookup[dateStr]:null;
    if(sched&&sched.start){
      // Handle multi-shift: use first shift start, last shift end
      var schedStarts=sched.start.split(','),schedEnds=sched.end.split(',');
      var schedStartMin=timeToMin(schedStarts[0]);
      var schedEndMin=timeToMin(schedEnds[schedEnds.length-1]);
      var schedHours=(schedEndMin-schedStartMin)/60;
      
      // Late check (checkin vs first shift start, with grace)
      if(a.checkin){
        var checkinMin=timeToMin(a.checkin);
        var lateMins=checkinMin-schedStartMin;
        if(lateMins>GRACE_MINUTES){
          a.lateMin=lateMins;
          totalLate+=lateMins;
          lateCount++;
        }
      }
      // Early leave check (checkout vs last shift end)
      if(a.checkout){
        var checkoutMin=timeToMin(a.checkout);
        var earlyMins=schedEndMin-checkoutMin;
        if(earlyMins>GRACE_MINUTES){
          a.earlyMin=earlyMins;
          earlyLeaveCount++;
        }
      }
      // OT: actual hours - scheduled hours
      if(hrs>schedHours){
        a.otMin=Math.round((hrs-schedHours)*60);
        totalOT+=(hrs-schedHours);
      }
      a.schedStart=schedStarts[0];
      a.schedEnd=schedEnds[schedEnds.length-1];
      a.schedHours=schedHours;
    }
  });
  
  // Summary cards
  var h='<div class="att-summary">';
  h+='<div class="att-summary-card"><div class="att-s-value">'+workDays+'</div><div class="att-s-label">Ngày đi làm</div></div>';
  h+='<div class="att-summary-card"><div class="att-s-value">'+totalH.toFixed(1)+'h</div><div class="att-s-label">Tổng giờ thực</div></div>';
  if(totalOT>0){
    h+='<div class="att-summary-card" style="border-color:#ff9800"><div class="att-s-value" style="color:#e65100">'+totalOT.toFixed(1)+'h</div><div class="att-s-label">Tăng ca</div></div>';
  }else{
    h+='<div class="att-summary-card"><div class="att-s-value" style="color:#2e7d32">0</div><div class="att-s-label">Tăng ca</div></div>';
  }
  h+='</div>';
  
  if(lateCount>0){
    h+='<div style="background:#fff3e0;border:1px solid #ffe082;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:#e65100"><i class="fas fa-exclamation-triangle"></i> Trễ <b>'+lateCount+'</b> lần, tổng <b>'+totalLate+'</b> phút</div>';
  }
  
  // Table
  h+='<div style="overflow-x:auto"><table class="att-table"><thead><tr>';
  h+='<th>Ngày</th><th>Thứ</th><th>Lịch làm</th><th><i class="fas fa-sign-in-alt"></i> Vào</th><th><i class="fas fa-sign-out-alt"></i> Ra</th><th>Giờ</th><th>Ghi chú</th>';
  h+='</tr></thead><tbody>';
  
  var dayNamesShort=['CN','T2','T3','T4','T5','T6','T7'];
  
  attendance.forEach(function(a){
    var dayNum=a.day;
    var d=new Date(year,mon-1,dayNum);
    var dw=d.getDay();
    var isWE=dw===0||dw===6;
    var hrs=parseFloat(a.hours)||0;
    
    h+='<tr class="'+(isWE?'weekend-row':'')+'">';
    h+='<td class="day-col">'+dayNum+'/'+mon+'</td>';
    h+='<td style="font-size:11px;color:'+(isWE?'#c62828':'#666')+'">'+dayNamesShort[dw]+'</td>';
    
    // Scheduled shift
    if(a.schedStart){
      h+='<td style="font-size:10px;color:#1565c0;font-weight:600">'+a.schedStart+'-'+a.schedEnd+'</td>';
    }else{
      h+='<td class="no-data-cell" style="font-size:10px">-</td>';
    }
    
    // Checkin with late badge
    if(a.checkin){
      var cinHtml='<span class="time-in">'+a.checkin+'</span>';
      if(a.lateMin){
        cinHtml+=' <span style="background:#ffebee;color:#c62828;padding:1px 5px;border-radius:4px;font-size:9px;font-weight:700">Trễ '+a.lateMin+'p</span>';
      }
      h+='<td>'+cinHtml+'</td>';
    }else{
      h+='<td class="no-data-cell">-</td>';
    }
    
    // Checkout with early leave badge
    if(a.checkout){
      var coutHtml='<span class="time-out">'+a.checkout+'</span>';
      if(a.earlyMin){
        coutHtml+=' <span style="background:#fff3e0;color:#e65100;padding:1px 5px;border-radius:4px;font-size:9px;font-weight:700">Sớm '+a.earlyMin+'p</span>';
      }
      h+='<td>'+coutHtml+'</td>';
    }else{
      h+='<td class="no-data-cell">-</td>';
    }
    
    // Hours
    if(hrs>0){
      h+='<td class="hours-col">'+hrs.toFixed(1)+'</td>';
    }else{
      h+='<td class="no-data-cell">-</td>';
    }
    
    // Notes (OT, late summary)
    var notes=[];
    if(a.otMin&&a.otMin>0) notes.push('<span style="background:#e8f5e9;color:#2e7d32;padding:1px 5px;border-radius:4px;font-size:9px;font-weight:700">OT +'+a.otMin+'p</span>');
    h+='<td>'+notes.join(' ')+'</td>';
    
    h+='</tr>';
  });
  
  h+='<tr class="total-row">';
  h+='<td colspan="3"><i class="fas fa-calculator"></i> Tổng cộng</td>';
  h+='<td></td><td></td>';
  h+='<td>'+totalH.toFixed(1)+'h</td>';
  h+='<td>'+(totalOT>0?'OT: '+totalOT.toFixed(1)+'h':'')+'</td>';
  h+='</tr>';
  h+='</tbody></table></div>';
  
  document.getElementById('attendanceContent').innerHTML=h;
}

      h+='<table style="width:100%;border-collapse:collapse;font-size:13px">';
      detail.otherItems.forEach(function(o){h+='<tr><td style="padding:8px 12px;border-bottom:1px solid #eee">'+(o.name||'Khác')+'</td><td style="padding:8px 12px;text-align:right;font-weight:700;border-bottom:1px solid #eee">'+fc(o.amount)+'</td></tr>';});
      h+='</table>';
    }
    // TỔNG KẾT
    h+='<div style="background:linear-gradient(135deg,#1b5e20,#2e7d32);color:white;padding:8px 12px;font-weight:800;font-size:13px;margin-top:12px;border-radius:6px 6px 0 0"><i class="fas fa-calculator"></i> TỔNG KẾT 合計</div>';
    h+='<table style="width:100%;border-collapse:collapse;font-size:13px">';
    h+='<tr><td style="padding:8px 12px;border-bottom:1px solid #eee">Tiền công <span style="font-size:10px;color:#888">工資</span></td><td style="padding:8px 12px;text-align:right;font-weight:700;border-bottom:1px solid #eee">'+fc(detail.monthlyWage)+'</td></tr>';
    h+='<tr><td style="padding:8px 12px;border-bottom:1px solid #eee">Tăng ca <span style="font-size:10px;color:#888">加班費</span></td><td style="padding:8px 12px;text-align:right;font-weight:700;color:var(--info);border-bottom:1px solid #eee">'+fc(detail.otPay)+'</td></tr>';
    h+='<tr><td style="padding:8px 12px;border-bottom:1px solid #eee">Tiền lễ <span style="font-size:10px;color:#888">節日費</span></td><td style="padding:8px 12px;text-align:right;font-weight:700;color:var(--danger);border-bottom:1px solid #eee">'+fc(detail.holPay)+'</td></tr>';
    h+='<tr><td style="padding:8px 12px;border-bottom:1px solid #eee">Thưởng <span style="font-size:10px;color:#888">獎金</span></td><td style="padding:8px 12px;text-align:right;font-weight:700;border-bottom:1px solid #eee">'+fc(detail.totalBonus)+'</td></tr>';
    h+='<tr><td style="padding:8px 12px;border-bottom:1px solid #eee">Phạt/Trừ <span style="font-size:10px;color:#888">扣款</span></td><td style="padding:8px 12px;text-align:right;font-weight:700;color:var(--danger);border-bottom:1px solid #eee">- '+fc(detail.totalDeduct)+'</td></tr>';
    h+='<tr style="background:linear-gradient(135deg,#e8f5e9,#c8e6c9)"><td style="padding:12px;font-weight:900;font-size:15px"><i class="fas fa-hand-holding-usd"></i> THỰC LÃNH <span style="font-size:10px;color:#888">實領</span></td><td style="padding:12px;text-align:right;font-weight:900;font-size:18px;color:var(--success)">'+fc(detail.netPay)+'</td></tr>';
    h+='</table>';
  } else {
    // Fallback: simple field list
    var fields=['Tổng giờ NC','Tổng giờ OT','Tổng giờ Lễ','Lương NC','Lương OT','Lương Lễ','Phụ cấp','Thưởng','Khấu trừ','THỰC LÃNH'];
    h+='<div style="padding:8px">';
    fields.forEach(function(f){
      var val=p[f]||'0';var isHL=f==='THỰC LÃNH';
      h+='<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee;'+(isHL?'font-weight:700;font-size:16px;color:var(--success);border-top:2px solid var(--success);margin-top:4px':'')+'"><span>'+f+'</span><span>'+val+'</span></div>';
    });
    h+='</div>';
  }
  h+='</div>';
  el.innerHTML=h;
}
function downloadPayrollImage(){
  var captureId=_currentPayTab==='chamcong'?'payAttCapture':'payDetailCapture';
  var el=document.getElementById(captureId);
  if(!el){showToast('Chưa có dữ liệu để tải','error');return;}
  var month=document.getElementById('payMonth').value;
  var label=_currentPayTab==='chamcong'?'ChamCong':'ChiTietLuong';
  html2canvas(el,{scale:2,backgroundColor:'#ffffff',useCORS:true,width:el.scrollWidth,height:el.scrollHeight,scrollX:0,scrollY:0,windowWidth:el.scrollWidth+40}).then(function(canvas){
    var link=document.createElement('a');
    link.download='BangLuong_'+label+'_'+(currentUser.empId||'')+'_'+month+'.png';
    link.href=canvas.toDataURL('image/png');
    link.click();
    showToast('Đã tải ảnh thành công','success');
  }).catch(function(e){showToast('Lỗi tải ảnh: '+e.message,'error');});
}

function loadPayroll(){
  var sel=document.getElementById('payMonth');
  if(!sel)return;
  var month=sel.value;
  if(!month){
    document.getElementById('payrollContent').innerHTML='<div class="no-data"><i class="fas fa-file-invoice-dollar"></i>Vui lòng chọn tháng</div>';
    return;
  }
  document.getElementById('payrollContent').innerHTML='<div style="text-align:center;padding:30px;color:#999"><i class="fas fa-spinner fa-spin"></i> Đang tải...</div>';
  
  apiCall({action:'getPayroll',empId:currentUser.empId,month:month},function(res){
    if(!res.success){
      document.getElementById('payrollContent').innerHTML='<div class="no-data" style="color:var(--danger)">'+res.error+'</div>';
      return;
    }
    if(!res.published||!res.payroll){
      document.getElementById('payrollContent').innerHTML='<div class="no-data"><i class="fas fa-lock" style="font-size:24px;margin-bottom:8px;display:block"></i>Bảng lương tháng '+month+' chưa được phát 薪資尚未發佈</div>';
      document.getElementById('payrollSubTabs').style.display='none';
      document.getElementById('payDownloadBtn').style.display='none';
      return;
    }
    _payrollData=res.payroll;
    document.getElementById('payrollStatus').textContent='Đã phát 已發';
    document.getElementById('payrollStatus').className='status-badge status-published';
    // Show sub-tabs and download button
    document.getElementById('payrollSubTabs').style.display='flex';
    document.getElementById('payDownloadBtn').style.display='';
    // Reset to chamcong tab
    _currentPayTab='chamcong';
    document.querySelectorAll('.pay-sub-tab').forEach(function(b){b.classList.remove('active');b.style.color='#999';b.style.borderBottomColor='transparent';});
    var ccBtn=document.getElementById('payTabCC');
    if(ccBtn){ccBtn.classList.add('active');ccBtn.style.color='var(--primary)';ccBtn.style.borderBottomColor='var(--primary)';}
    renderPayrollTab();
  });
}

// Auto-init
restoreSavedLogin();

</script>
